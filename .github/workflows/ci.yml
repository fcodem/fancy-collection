name: CI

on:
  push:
    branches: [main, performance-optimization, fix/**]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: web

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build?sslmode=disable
          DIRECT_URL: postgresql://build:build@127.0.0.1:5432/build?sslmode=disable
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test:unit
      - name: Lint
        run: npm run lint
      - name: Build
        run: npx next build
        env:
          DATABASE_URL: postgresql://build:build@127.0.0.1:5432/build?sslmode=disable
          DIRECT_URL: postgresql://build:build@127.0.0.1:5432/build?sslmode=disable
          SKIP_PRISMA_MIGRATE: "1"
          NEXT_TELEMETRY_DISABLED: "1"

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: fancy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Prisma generate
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@127.0.0.1:5432/fancy_test?sslmode=disable
          DIRECT_URL: postgresql://test:test@127.0.0.1:5432/fancy_test?sslmode=disable
      - name: Apply migrations (test DB only)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@127.0.0.1:5432/fancy_test?sslmode=disable
          DIRECT_URL: postgresql://test:test@127.0.0.1:5432/fancy_test?sslmode=disable
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
        env:
          DATABASE_URL: postgresql://test:test@127.0.0.1:5432/fancy_test?sslmode=disable
          DIRECT_URL: postgresql://test:test@127.0.0.1:5432/fancy_test?sslmode=disable
          NODE_ENV: test
