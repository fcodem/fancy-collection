{% extends "base.html" %}
{% block title %}Alternate Booking{% endblock %}
{% block page_title %}Alternate Booking{% endblock %}
{% block breadcrumb %}View dresses returning on delivery date with next booking info{% endblock %}

{% block content %}
<div class="card" style="margin-bottom:24px;">
  <div class="card-header">
    <h3 class="card-title"><i class="fa-solid fa-arrows-rotate" style="margin-right:8px;"></i>Select Delivery Date</h3>
  </div>
  <div class="card-body">
    <div style="display:flex; gap:16px; align-items:end;">
      <div>
        <label style="font-weight:600; font-size:13px;">Date of Delivery</label>
        <input type="date" id="targetDate" class="form-input" value="{{ today_iso }}">
      </div>
      <button onclick="loadData()" class="btn btn-primary"><i class="fa-solid fa-search"></i> Search</button>
      <button onclick="window.print()" class="btn btn-outline no-print"><i class="fa-solid fa-print"></i> Print</button>
    </div>
  </div>
</div>

<div id="resultsList"></div>

<script>
const targetDate = document.getElementById('targetDate');
targetDate.addEventListener('change', loadData);

function loadData() {
  fetch(`/api/returning-today?date=${targetDate.value}`)
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById('resultsList');
      if (!data.length) {
        container.innerHTML = '<div class="card"><div class="card-body" style="text-align:center; padding:40px; color:#999;"><i class="fa-solid fa-check-circle" style="font-size:36px; color:#28a745;"></i><p>No alternate bookings for this date. No dresses are both returning and being delivered.</p></div></div>';
        return;
      }
      container.innerHTML = data.map(r => `
        <div class="card" style="margin-bottom:16px; border-left:4px solid ${r.next_booking ? '#f39c12' : 'var(--primary)'};">
          <div class="card-body" style="padding:0;">
            <div style="display:grid; grid-template-columns:1fr 1fr; min-height:180px;">
              <!-- LEFT: Returning From -->
              <div style="padding:20px; border-right:1px solid #eee;">
                <h4 style="color:var(--primary); margin-bottom:14px; font-size:14px; display:flex; align-items:center; gap:8px;">
                  <i class="fa-solid fa-rotate-left"></i> Returning From
                </h4>
                <table style="width:100%; font-size:13px; line-height:1.8;">
                  <tr><td style="font-weight:600; width:35%; color:#666;">Customer:</td><td><strong>${r.customer_name}</strong></td></tr>
                  <tr><td style="font-weight:600; color:#666;">Serial No:</td><td>#${String(r.serial).padStart(2,'0')}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Contact:</td><td>${r.contact_1}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">WhatsApp:</td><td>${r.whatsapp_no || '-'}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Return Time:</td><td>${r.return_time}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Venue:</td><td>${r.venue || '-'}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Address:</td><td>${r.address}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Security:</td><td>₹${Number(r.security_collected).toLocaleString()}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Balance Due:</td><td style="color:#dc3545; font-weight:700;">₹${Number(r.total_remaining - r.remaining_collected).toLocaleString()}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Items:</td><td>${r.items.join(', ')}</td></tr>
                  ${r.delivery_notes ? `<tr><td style="font-weight:600; color:#666;">Notes:</td><td>${r.delivery_notes}</td></tr>` : ''}
                </table>
              </div>

              <!-- RIGHT: Delivering To -->
              <div style="padding:20px; ${r.next_booking ? '' : 'opacity:0.5;'}">
                ${r.next_booking ? `
                <h4 style="color:#f39c12; margin-bottom:14px; font-size:14px; display:flex; align-items:center; gap:8px;">
                  <i class="fa-solid fa-truck-fast"></i> Delivering To (Next Customer)
                </h4>
                <table style="width:100%; font-size:13px; line-height:1.8;">
                  <tr><td style="font-weight:600; width:35%; color:#666;">Customer:</td><td><strong>${r.next_booking.customer_name}</strong></td></tr>
                  <tr><td style="font-weight:600; color:#666;">Serial No:</td><td>#${String(r.next_booking.serial).padStart(2,'0')}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Contact:</td><td>${r.next_booking.contact_1 || '-'}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Delivery Time:</td><td>${r.next_booking.delivery_time}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Delivery Date:</td><td>${r.next_booking.delivery_date}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Venue:</td><td>${r.next_booking.venue || '-'}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Address:</td><td>${r.next_booking.address}</td></tr>
                  <tr><td style="font-weight:600; color:#666;">Total Rent:</td><td style="font-weight:700; color:var(--primary);">₹${Number(r.next_booking.total_price).toLocaleString()}</td></tr>
                </table>
                ` : `
                <h4 style="color:#999; margin-bottom:14px; font-size:14px;">
                  <i class="fa-solid fa-circle-minus"></i> No Next Booking
                </h4>
                <p style="color:#999; font-size:13px;">This dress is not booked for delivery on this date after return.</p>
                `}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    });
}

loadData();
</script>
{% endblock %}
