{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Password{% endblock %}
{% block breadcrumb %}Profile &rsaquo; Change Password{% endblock %}

{% block content %}
<div style="max-width:420px; margin:0 auto;">
  <div class="card">
    <div class="card-header">
      <h3 class="card-title"><i class="fa-solid fa-key" style="margin-right:8px; color:var(--gold);"></i>Change Your Password</h3>
    </div>
    <div class="card-body">
      <form method="post">
        <div class="form-group">
          <label class="form-label">Current Password *</label>
          <input type="password" name="current_password" class="form-control" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">New Password *</label>
          <input type="password" name="new_password" class="form-control" required minlength="4" placeholder="Min. 4 characters">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm New Password *</label>
          <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <div style="display:flex; gap:10px; margin-top:8px;">
          <button type="submit" class="btn btn-primary" style="flex:1;">
            <i class="fa-solid fa-save"></i> Update Password
          </button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-outline" style="flex:1; text-align:center;">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
