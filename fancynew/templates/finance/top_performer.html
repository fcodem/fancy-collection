{% extends "base.html" %}
{% block title %}Top Performer{% endblock %}
{% block page_title %}Top Performer{% endblock %}
{% block breadcrumb %}Finance → Top Performing Products{% endblock %}

{% block content %}
<div class="card">
  <div class="card-header">
    <h3 class="card-title"><i class="fa-solid fa-trophy" style="margin-right:8px; color:var(--gold);"></i>Top Performer</h3>
    <button onclick="window.print()" class="btn btn-outline btn-sm no-print"><i class="fa-solid fa-print"></i> Print</button>
  </div>
  <div class="card-body">
    <div style="display:flex; gap:12px; margin-bottom:20px; align-items:end; flex-wrap:wrap;">
      <div>
        <label style="font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted);">From</label>
        <input type="date" id="tpFrom" class="form-control" value="{{ today.replace(day=1).isoformat() }}" onchange="loadData()">
      </div>
      <div>
        <label style="font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted);">To</label>
        <input type="date" id="tpTo" class="form-control" value="{{ today.isoformat() }}" onchange="loadData()">
      </div>
      <div>
        <label style="font-size:11px; font-weight:700; text-transform:uppercase; color:var(--text-muted);">Category</label>
        <select id="tpCategory" class="form-control" onchange="loadData()">
          <option value="">All</option>
          <optgroup label="🤵 Men's">{% for c in mens_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}</optgroup>
          <optgroup label="👗 Women's">{% for c in womens_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}</optgroup>
          <optgroup label="💎 Jewellery">{% for c in jewellery_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}</optgroup>
          <optgroup label="👒 Accessories">{% for c in accessory_categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}</optgroup>
        </select>
      </div>
    </div>

    <div id="topList"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loadData() {
  const from = document.getElementById('tpFrom').value;
  const to = document.getElementById('tpTo').value;
  const cat = document.getElementById('tpCategory').value;
  let url = '/api/finance/top-performer?from=' + from + '&to=' + to;
  if (cat) url += '&category=' + encodeURIComponent(cat);

  fetch(url).then(r => r.json()).then(data => {
    if (!data.length) {
      document.getElementById('topList').innerHTML = '<p style="text-align:center; padding:40px; color:var(--text-muted);">No data for selected period.</p>';
      return;
    }
    let html = '<table class="data-table"><thead><tr><th>#</th><th>Product</th><th>Category</th><th>Size</th><th>Bookings</th><th>Total Earned</th></tr></thead><tbody>';
    data.forEach((item, i) => {
      html += `<tr>
        <td><strong>${i + 1}</strong></td>
        <td><strong>${item.name}</strong></td>
        <td>${item.category}</td>
        <td>${item.size || '—'}</td>
        <td>${item.bookings}</td>
        <td style="font-weight:700; color:var(--success);">₹${Number(item.total_earned).toLocaleString('en-IN')}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('topList').innerHTML = html;
  });
}
document.addEventListener('DOMContentLoaded', loadData);
</script>
{% endblock %}
